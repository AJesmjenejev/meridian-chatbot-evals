name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint & format check (ruff)
        run: |
          ruff check .
          ruff format --check .

      - name: Run unit tests
        run: pytest -q

      - name: Offline mock run (no token / no network)
        run: |
          python -m meridian_evals --mock fixtures/demo_cassette.json fixtures/mock_demo.yaml --out outputs

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mock-report-py${{ matrix.python-version }}
          path: outputs/
          if-no-files-found: ignore
